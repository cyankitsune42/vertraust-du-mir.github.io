<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Für dich...</title>
    <style>
        /* Importiert magische Schriftarten von Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap');

        /* Grunddesign der Seite: Dunkles Hogwarts-Schloss-Ambiente */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            /* Mystischer Farbverlauf wie eine Schlossmauer bei Nacht */
            background: radial-gradient(circle, #2c1a10 0%, #0f0a06 100%);
            font-family: 'EB Garamond', serif;
            overscroll-behavior-y: contain; 
            overflow-y: auto; 
            color: #fcf5e3;
        }

        /* Container für die Zentrierung */
        .wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Das edle, magische Pergament */
        .parchment {
            background: #f1e4c3;
            background-image: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(139,90,43,0.2) 100%);
            /* Doppelter, feiner Schloss-Rahmen */
            border: 6px double #3a2312;
            border-radius: 2px;
            padding: 50px 30px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 
                0 15px 35px rgba(0,0,0,0.7),
                inset 0 0 60px rgba(92, 53, 19, 0.4);
            position: relative;
            box-sizing: border-box;
            transform: scale(0.98);
            animation: unfold 1.2s ease forwards;
        }

        /* Kleine Einblend-Animation für den Brief */
        @keyframes unfold {
            to { transform: scale(1); }
        }

        /* Das Schließen-X oben rechts */
        .close-x {
            display: none; /* Erst auf Seite 2 sichtbar */
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.6rem;
            color: #5c3513;
            cursor: pointer;
            font-family: 'Cinzel Decorative', serif;
            font-weight: bold;
            transition: transform 0.2s, color 0.2s;
            user-select: none;
        }

        .close-x:hover {
            transform: scale(1.2);
            color: #a12a2a; /* Gryffindor-Rot beim Drüberschweben */
        }

        /* Haupttext auf dem Pergament (Dunkle Zaubertinte) */
        .message {
            font-size: 1.45rem;
            color: #2b1a09; 
            line-height: 1.7;
            margin-bottom: 35px;
            font-style: italic;
            font-weight: bold;
        }

        /* Der Start-Button auf Seite 1 im Hogwarts-Stil */
        .start-cheer-btn {
            padding: 15px 25px;
            font-size: 1.05rem;
            font-family: 'Cinzel Decorative', serif;
            background: linear-gradient(135deg, #3a2312 0%, #1a1008 100%);
            color: #d4af37; /* Hogwarts-Gold */
            border: 2px solid #d4af37;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .start-cheer-btn:hover {
            background: linear-gradient(135deg, #5c3513 0%, #2c1a10 100%);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            transform: translateY(-2px);
        }

        /* Der automatische Komplimente-Bereich (Seite 2) */
        .laune-bereich {
            display: none;
        }

        .compliment-box {
            font-size: 1.5rem;
            color: #5c3513; /* Tintenfarbe */
            font-weight: bold;
            font-style: italic;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.6;
            transition: opacity 0.6s ease;
        }

        /* Magischer Untertext auf Seite 2 */
        .sub-text {
            font-size: 0.95rem;
            color: #8c6845;
            margin-top: 25px;
            font-family: 'Cinzel Decorative', serif;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="wrapper">

        <div class="parchment">
            <div class="close-x" id="closeBtn" onclick="showStartPage()">✕</div>

            <div id="seite1">
                <p class="message">
                    Diesmal hat es leider nicht geklappt... aber wann immer es dich mal auf diese Seite verirrt, vergiss niemals: Ich bin für dich da. ✨
                </p>
                <button class="start-cheer-btn" onclick="showLaunePage()">
                    Brauchst du ein kurzes Lächeln? Klick hier!
                </button>
            </div>

            <div id="seite2" class="laune-bereich">
                <div class="compliment-box" id="complimentText">
                </div>
                <div class="sub-text">🔮 Felix Felicis wirkt... Die Sprüche wechseln von selbst 🔮</div>
            </div>

        </div>

    </div>

    <script>
        // Eine Liste mit charmanten Sprüchen
        const compliments = [
            "Du bist der Grund, warum heute jemand da draußen lächelt! 😊",
            "Egal wie grau der Tag wirkt: Du bringst deine ganz eigene Magie hinein! 🔮✨",
            "Kopf hoch, Prinzessin! Die Welt ist schöner, weil es dich gibt. 🌍",
            "Du verdienst heute den leckersten Pudding und ein großes stück Schokolade! 🍮🍫",
            "Atme tief durch. Du machst das großartig! 🌟",
            "Wenn du mal vergisst, wie wunderbar du bist – diese Seite merkt es sich für dich! 🌸",
            "Ein kleiner Reminder: Du bist absolut einzigartig! ⚔️💛",
            "Lass dir dein Lächeln von niemandem nehmen. Es steht dir viel zu gut! 😍"
        ];

        let intervalId = null;
        let currentIndex = 0; // Startet beim ersten Spruch (Index 0)

        // Funktion: Zeigt das nächste Kompliment der Reihe nach an
        function changeCompliment() {
            const box = document.getElementById('complimentText');

            // Sanftes Ausblenden
            box.style.opacity = 0;
            
            setTimeout(() => {
                // Aktuellen Spruch in die Box setzen
                box.innerText = compliments[currentIndex];
                // Einblenden
                box.style.opacity = 1;

                // Index für das nächste Mal erhöhen
                currentIndex++;

                // Wenn das Ende der Liste erreicht ist, wieder bei 0 anfangen
                if (currentIndex >= compliments.length) {
                    currentIndex = 0;
                }
            }, 600); // Magisch-sanfter Übergang
        }

        // Wechselt zu Seite 2 (Gute Laune)
        function showLaunePage() {
            document.getElementById('seite1').style.display = 'none';
            document.getElementById('seite2').style.display = 'block';
            document.getElementById('closeBtn').style.display = 'block';

            // Index zurücksetzen, damit es immer beim ersten Spruch anfängt
            currentIndex = 0; 
            
            // Direkt das erste Kompliment anzeigen
            changeCompliment();

            // Intervall starten: Alle 5 Sekunden der Reihe nach wechseln
            intervalId = setInterval(changeCompliment, 5000);
        }

        // Wechselt zurück zu Seite 1 (Startseite)
        function showStartPage() {
            document.getElementById('seite2').style.display = 'none';
            document.getElementById('closeBtn').style.display = 'none';
            document.getElementById('seite1').style.display = 'block';

            // Automatischen Wechsel stoppen
            if (intervalId) {
                clearInterval(intervalId);
            }
        }
    </script>

</body>
</html>
