<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eine Frage...</title>
    <style>
        /* Grunddesign der Seite */
        body {
            font-family: 'Georgia', serif;
            background-color: #f4ece1;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Der geheimnisvolle Start-Button */
        .trust-button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #8b5a2b;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .trust-button:hover {
            background-color: #6f4621;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        /* Das Pergament (anfänglich unsichtbar) */
        .parchment {
            display: none;
            opacity: 0;
            background: #fcf5e3;
            background-image: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.05) 100%);
            border: 8px double #8b5a2b; /* Edler, alter Doppelrahmen */
            border-radius: 4px;
            padding: 40px 50px;
            max-width: 450px;
            text-align: center;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.15),
                inset 0 0 50px rgba(139,90,43,0.2);
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
        }

        /* Der Text auf dem Pergament */
        .parchment p {
            font-size: 1.6rem;
            color: #4a2f15;
            line-height: 1.6;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Container für die Antwort-Buttons */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* Styling für die Ja/Nein Buttons */
        .choice-btn {
            padding: 10px 25px;
            font-size: 1.1rem;
            font-family: 'Georgia', serif;
            border: 1px solid #8b5a2b;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-yes {
            background-color: #8b5a2b;
            color: white;
        }

        .btn-yes:hover {
            background-color: #6f4621;
            transform: scale(1.05);
        }

        .btn-no {
            background-color: transparent;
            color: #8b5a2b;
        }

        .btn-no:hover {
            background-color: rgba(139, 90, 43, 0.1);
            transform: scale(1.05);
        }

        /* Klasse zum Einblenden via JavaScript */
        .show-parchment {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Das Pop-up (Modal) für "Nein" */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #fcf5e3;
            border: 2px solid #8b5a2b;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 300px;
            animation: popIn 0.3s ease;
        }

        .modal-content p {
            font-size: 1.2rem;
            color: #4a2f15;
            margin-bottom: 20px;
        }

        .modal-close-btn {
            padding: 8px 20px;
            background-color: #8b5a2b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <button class="trust-button" id="mainButton" onclick="revealMessage()">
        Nur wenn du mir Vertraust, sollst du mich anklicken.
    </button>

    <div class="parchment" id="parchmentPaper">
        <p>Magst du heute mit mir ein Eis essen gehen? 🍦</p>
        
        <div class="button-group">
            <a href="https://wa.me/4917683472940?text=Seid%20gegr%C3%BC%C3%9Ft%2C%20edler%20Herr%20%2F%20werte%20Maid%2C%0A%0AEure%20Botschaft%20hat%20mein%20Herz%20erfreut%20wie%20der%20Morgentau%20im%20Mai.%20Gerne%20nehme%20ich%20Eure%20Einladung%20an%2C%20denn%20Eure%20holden%20Worte%20klingen%20wie%20s%C3%BC%C3%9Fe%20Musik%20in%20meinen%20Ohren.%0A%0ALasset%20uns%20treffen%20am%20Tage%20des%20Herrn%20%5Boder%3A%20am%20kommenden%20Wochentag%5D%20zur%20elften%20Stunde%20%5Boder%20genaue%20Uhrzeit%20einf%C3%BCgen%5D%20beim%20%5BOrt%2FTreffpunkt%20eintragen%5D.%20Ich%20harre%20bereits%20mit%20gro%C3%9Fer%20Ungeduld%20unserer%20Zusammenkunft%20und%20verbleibe%20in%20voller%20Vorfreude.%0A%0AMit%20vorz%C3%BCglichstem%20Gru%C3%9Fe%2C" 
               target="_blank" 
               class="choice-btn btn-yes">
               Ja!
            </a>
            
            <button class="choice-btn btn-no" onclick="showNoPopup()">
                Nein
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="noModal">
        <div class="modal-content">
            <p>Kein Problem, vielleicht beim nächsten Mal! 😊</p>
            <button class="modal-close-btn" onclick="closeNoPopup()">Schließen</button>
        </div>
    </div>

    <script>
        // Funktion: Ersten Button verstecken & Pergament zeigen
        function revealMessage() {
            const button = document.getElementById('mainButton');
            const parchment = document.getElementById('parchmentPaper');

            button.style.display = 'none';
            parchment.classList.add('show-parchment');
            
            setTimeout(() => {
                parchment.style.opacity = '1';
            }, 10);
        }

        // Funktion: Pop-up bei "Nein" anzeigen
        function showNoPopup() {
            document.getElementById('noModal').style.display = 'flex';
        }

        // Funktion: Pop-up schließen
        function closeNoPopup() {
            document.getElementById('noModal').style.display = 'none';
        }
    </script>

</body>
</html>
