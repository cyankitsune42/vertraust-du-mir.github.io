<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Für dich...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap');

        html, body { margin: 0; padding: 0; height: 100%; background: #1a1008; font-family: 'Georgia', serif; }
        .wrapper { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .parchment { background: #fcf5e3; border: 6px double #3a2312; padding: 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        
        /* Zauberstab Button - Jetzt als echtes Icon */
        .wand-container { cursor: pointer; transition: transform 0.3s; margin-top: 20px; }
        .wand-container:hover { transform: scale(1.1) rotate(-10deg); }
        
        .laune-bereich, #riddlePage { display: none; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="parchment">
            <div id="closeBtn" style="display:none; cursor:pointer; text-align:right;" onclick="location.reload()">✕</div>

            <div id="seite1">
                <p>Diesmal hat es leider nicht geklappt... aber ich bin für dich da. ✨</p>
                <button onclick="document.getElementById('seite2').style.display='block'; document.getElementById('seite1').style.display='none';">Lächeln gefällig?</button>
            </div>

            <div id="seite2" class="laune-bereich">
                <p>Du bist wunderbar! ✨</p>
            </div>

            <div id="riddlePage">
                <p id="riddleText"></p>
                <input type="text" id="riddleAnswer">
                <button onclick="checkAnswer()">Antworten</button>
            </div>
        </div>

        <div class="wand-container" onclick="startRiddleMode()">
            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2l2 2-2 2-2-2zM12 22l-2-2 2-2 2 2zM3 12l2 2-2 2-2-2zM21 12l2 2-2 2-2-2zM12 8l4 4-4 4-4-4z"/>
            </svg>
            <p style="color: #d4af37; margin: 0; font-family: 'Cinzel Decorative'; font-size: 0.8rem;">Geheimnis lüften</p>
        </div>
    </div>

    <script>
        const riddles = [
            { q: "Gryffindor Wappentier?", a: "löwe" },
            { q: "Hausmeister von Hogwarts?", a: "filch" },
            { q: "Licht-Zauberspruch?", a: "lumos" },
            { q: "Besensport?", a: "quidditch" },
            { q: "Wie heißt die Schule?", a: "hogwarts" }
        ];
        let currentRiddle = 0;

        function startRiddleMode() {
            document.getElementById('seite1').style.display = 'none';
            document.getElementById('seite2').style.display = 'none';
            document.getElementById('riddlePage').style.display = 'block';
            document.getElementById('riddleText').innerText = riddles[currentRiddle].q;
        }

        function checkAnswer() {
            if(document.getElementById('riddleAnswer').value.toLowerCase().trim() === riddles[currentRiddle].a) {
                currentRiddle++;
                if(currentRiddle < riddles.length) document.getElementById('riddleText').innerText = riddles[currentRiddle].q;
                else window.location.href = "https://cyankitsune42.github.io/";
            } else alert("Versuch es nochmal!");
        }
    </script>
</body>
</html>
