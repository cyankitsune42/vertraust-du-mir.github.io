<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Für dich...</title>
    <style>
        /* Grunddesign der Seite */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f4ece1;
            font-family: 'Georgia', serif;
            /* Ermöglicht das typische "Pull-to-Refresh" beim Runterswipen auf Handys */
            overscroll-behavior-y: contain; 
            overflow-y: auto; 
        }

        /* Container, um alles perfekt in der Mitte zu halten */
        .wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Der geheimnisvolle Start-Button */
        .trust-button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #8b5a2b;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .trust-button:hover {
            background-color: #6f4621;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        /* Das edle Pergament (anfänglich unsichtbar) */
        .parchment {
            display: none;
            opacity: 0;
            background: #fcf5e3;
            background-image: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.05) 100%);
            border: 8px double #8b5a2b;
            border-radius: 4px;
            padding: 40px 30px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.15),
                inset 0 0 50px rgba(139,90,43,0.2);
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
            box-sizing: border-box;
        }

        /* Haupttext auf dem Pergament */
        .parchment p.message {
            font-size: 1.4rem;
            color: #4a2f15;
            line-height: 1.6;
            margin-bottom: 25px;
            font-style: italic;
        }

        /* Trennlinie */
        .divider {
            border-top: 1px dashed #8b5a2b;
            margin: 25px 0;
            opacity: 0.5;
        }

        /* Der interaktive Gute-Laune-Bereich */
        .compliment-box {
            font-size: 1.2rem;
            color: #8b5a2b;
            font-weight: bold;
            min-height: 60px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.2s ease;
        }

        /* Der Gute-Laune-Button */
        .cheer-btn {
            padding: 12px 25px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            background-color: #8b5a2b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }

        .cheer-btn:hover {
            background-color: #6f4621;
            transform: scale(1.03);
        }

        /* Klasse zum Einblenden via JavaScript */
        .show-parchment {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="wrapper">

        <button class="trust-button" id="mainButton" onclick="revealMessage()">
            Nur wenn du mir Vertraust, sollst du mich anklicken.
        </button>

        <div class="parchment" id="parchmentPaper">
            <p class="message">
                Diesmal hat es leider nicht geklappt... aber wann immer es dich mal auf diese Seite verirrt, vergiss niemals: Ich bin für dich da. ✨
            </p>
            
            <div class="divider"></div>
            
            <div class="compliment-box" id="complimentText">
                Brauchst du ein kurzes Lächeln? Klick unten auf den Button! 👇
            </div>

            <button class="cheer-btn" onclick="generateCompliment()">
                ✨ Magischer Gute-Laune-Bringer
            </button>
        </div>

    </div>

    <script>
        // Funktion: Ersten Button verstecken & Pergament zeigen
        function revealMessage() {
            const button = document.getElementById('mainButton');
            const parchment = document.getElementById('parchmentPaper');

            button.style.display = 'none';
            parchment.classList.add('show-parchment');
            
            setTimeout(() => {
                parchment.style.opacity = '1';
            }, 10);
        }

        // Eine Liste mit charmanten Sprüchen, die gute Laune machen
        const compliments = [
            "Du bist der Grund, warum heute jemand da draußen lächelt! 😊",
            "Egal wie grau der Tag wirkt: Du bringst deine ganz eigene Farbe hinein! 🎨✨",
            "Kopf hoch, edle Maid! Die Welt ist schöner, weil es dich gibt. 🌍",
            "Du verdienst heute das größte Stück Kuchen und das cremigste Eis! 🍦🍰",
            "Atme tief durch. Du machst das alles großartig! 🌟",
            "Wenn du mal vergisst, wie wunderbar du bist – diese Seite merkt es sich für dich! 🌸",
            "Ein kleiner Reminder: Du bist absolut einzigartig! ⚔️💛",
            "Lass dir dein Lächeln von niemandem nehmen. Es steht dir viel zu gut! 😍"
        ];

        let lastIndex = -1;

        // Funktion: Wählt zufällig einen Spruch aus
        function generateCompliment() {
            const box = document.getElementById('complimentText');
            let randomIndex;
            
            do {
                randomIndex = Math.floor(Math.random() * compliments.length);
            } while (randomIndex === lastIndex);
            
            lastIndex = randomIndex;

            // Kurzer Ausblend-Effekt für den Textwechsel
            box.style.opacity = 0;
            setTimeout(() => {
                box.innerText = compliments[randomIndex];
                box.style.opacity = 1;
            }, 200);
        }
    </script>

</body>
</html>
