<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Für dich...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap');

        html, body {
            margin: 0; padding: 0; height: 100%;
            background-color: #1a1008;
            background-image: url('hintergrund.png'); 
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Georgia', serif;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .parchment {
            background: #fcf5e3;
            border: 6px double #3a2312;
            padding: 40px 30px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .laune-bereich { display: none; }
        .message { font-size: 1.4rem; color: #4a2f15; line-height: 1.6; margin-bottom: 30px; }
        .start-cheer-btn { padding: 15px 25px; font-size: 1rem; cursor: pointer; }
        
        /* Der Zauberstab-Button */
        .wand-trigger {
            font-size: 60px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        .wand-trigger:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="parchment">
            <div id="seite1">
                <p class="message">Diesmal hat es leider nicht geklappt... aber wann immer es dich mal auf diese Seite verirrt, vergiss niemals: Ich bin für dich da. ✨</p>
                <button class="start-cheer-btn" onclick="document.getElementById('seite1').style.display='none'; document.getElementById('seite2').style.display='block';">Lächeln gefällig?</button>
            </div>

            <div id="seite2" class="laune-bereich">
                <p>Du bist wunderbar! ✨</p>
            </div>

            <div id="riddlePage" class="laune-bereich">
                <p id="riddleText" style="font-size: 1.2rem;"></p>
                <input type="text" id="riddleAnswer">
                <button onclick="checkAnswer()">Antworten</button>
            </div>
        </div>

        <div class="wand-trigger" onclick="startRiddle()">🪄</div>
    </div>

    <script>
        const riddles = [
            { q: "Gryffindor Wappentier?", a: "löwe" },
            { q: "Hausmeister von Hogwarts?", a: "filch" },
            { q: "Licht-Zauberspruch?", a: "lumos" },
            { q: "Besensport?", a: "quidditch" },
            { q: "Wie heißt die Schule?", a: "hogwarts" }
        ];
        let step = 0;

        function startRiddle() {
            document.getElementById('seite1').style.display = 'none';
            document.getElementById('seite2').style.display = 'none';
            document.getElementById('riddlePage').style.display = 'block';
            document.getElementById('riddleText').innerText = riddles[step].q;
        }

        function checkAnswer() {
            let input = document.getElementById('riddleAnswer').value.toLowerCase().trim();
            if(input === riddles[step].a) {
                step++;
                if(step < riddles.length) {
                    document.getElementById('riddleText').innerText = riddles[step].q;
                    document.getElementById('riddleAnswer').value = "";
                } else {
                    window.location.href = "https://cyankitsune42.github.io/";
                }
            } else {
                alert("Nicht korrekt!");
            }
        }
    </script>
</body>
</html>
