<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=index.html">
    <title>Eine Frage...</title>
    <style>
        /* Grunddesign der Seite */
        body {
            font-family: 'Georgia', serif;
            background-color: #f4ece1;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Der geheimnisvolle Button */
        .trust-button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #8b5a2b;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .trust-button:hover {
            background-color: #6f4621;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        /* Das Pergament (anfänglich unsichtbar) */
        .parchment {
            display: none;
            opacity: 0;
            background: #fcf5e3;
            background-image: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.05) 100%);
            border: 2px solid #cfb997;
            border-radius: 4px;
            padding: 40px 60px;
            max-width: 400px;
            text-align: center;
            box-shadow: 
                0 0 20px rgba(0,0,0,0.1),
                inset 0 0 40px rgba(139,90,43,0.15);
            position: relative;
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
        }

        /* Pergament-Ränder-Effekt */
        .parchment::before, .parchment::after {
            content: "";
            position: absolute;
            height: 10px;
            width: 100%;
            left: 0;
            background: #e6d5bc;
        }
        .parchment::before { top: 0; border-radius: 4px 4px 0 0; }
        .parchment::after { bottom: 0; border-radius: 0 0 4px 4px; }

        /* Der Text auf dem Pergament */
        .parchment p {
            font-size: 1.5rem;
            color: #4a2f15;
            line-height: 1.6;
            margin: 0;
            font-style: italic;
        }

        /* Klasse zum Einblenden via JavaScript */
        .show-parchment {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <button class="trust-button" id="mainButton" onclick="revealMessage()">
        Nur wenn du mir Vertraust, sollst du mich anklicken.
    </button>

    <div class="parchment" id="parchmentPaper">
        <p>Magst du heute mit mir ein Eis essen gehen? 🍦</p>
    </div>

    <script>
        function revealMessage() {
            const button = document.getElementById('mainButton');
            const parchment = document.getElementById('parchmentPaper');

            // Button verschwinden lassen
            button.style.display = 'none';

            // Pergament anzeigen und Animation starten
            parchment.classList.add('show-parchment');
            
            // Kleiner Trick für die CSS-Transition (opacity)
            setTimeout(() => {
                parchment.style.opacity = '1';
            }, 10);
        }
    </script>

</body>
</html>
