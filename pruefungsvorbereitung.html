<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Für dich, mein Schatz</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a0d1a;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .love-container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 20px;
        }

        h1 {
            color: #ff3366;
            font-size: 3rem;
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.6);
            margin-bottom: 20px;
            animation: pulseText 2s infinite ease-in-out;
            line-height: 1.4;
        }

        @media (min-width: 768px) {
            h1 {
                font-size: 5rem;
            }
        }

        /* Große Herzanimation im Hintergrund */
        .big-heart {
            font-size: 6rem;
            color: #ff3366;
            display: inline-block;
            animation: beat 1.2s infinite ease-in-out;
            filter: drop-shadow(0 0 15px rgba(255, 51, 102, 0.8));
        }

        /* Schwebende kleine Herzen */
        .heart-particle {
            position: absolute;
            color: #ff4d79;
            font-size: 20px;
            pointer-events: none;
            bottom: -10%;
            animation: floatUp 6s linear infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.2); }
            60% { transform: scale(1.1); }
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) translateX(var(--random-x)) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="love-container">
        <h1>Ich liebe dich mein Schatz</h1>
        <div class="big-heart">❤️</div>
    </div>

    <script>
        // Erzeugt automatisch dauerhaft schwebende kleine Herzen im Hintergrund
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            heart.innerHTML = '❤️';
            
            // Zufällige Positionen und Größen für den natürlichen Look
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's'; // Zwischen 4 und 7 Sekunden
            heart.style.fontSize = Math.random() * 15 + 15 + 'px'; // Zwischen 15px und 30px
            heart.style.setProperty('--random-x', (Math.random() * 200 - 100) + 'px');
            
            document.body.appendChild(heart);

            // Nach der Animation löschen, um den Browser nicht zu verlangsamen
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        // Alle 300ms ein neues Herz aufsteigen lassen
        setInterval(createHeart, 300);
    </script>

</body>
</html>
