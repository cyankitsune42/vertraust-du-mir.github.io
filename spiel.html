<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Besenflug</title>
    <style>
        body { margin: 0; background: #0b0b1a; color: white; text-align: center; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; margin: 20px auto; background: #1a1008; border: 4px solid #d4af37; touch-action: none; }
    </style>
</head>
<body>
    <h1>Besenflug | Highscore: <span id="highscore">0</span></h1>
    <canvas id="gameCanvas" width="350" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let score = 0;
        let highscore = localStorage.getItem("besenHighscore") || 0;
        document.getElementById("highscore").innerText = highscore;

        let player = { x: 150, y: 400, size: 60 };
        let obstacles = [];
        
        // Dein Avatar-Bild
        const avatarImg = new Image();
        avatarImg.src = 'file_0000000037e871fd8bd6e0fd161d3f04.png';

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Hindernisse hinzufügen
            if (Math.random() < 0.03) {
                obstacles.push({ x: Math.random() * 300, y: -50 });
            }

            // Hindernisse bewegen & zeichnen
            obstacles.forEach((obs, index) => {
                obs.y += 4;
                ctx.fillStyle = "#a12a2a";
                ctx.fillRect(obs.x, obs.y, 40, 40);

                // Kollision prüfen
                if (obs.y > player.y && obs.y < player.y + player.size && 
                    obs.x > player.x - 30 && obs.x < player.x + 30) {
                    if (score > highscore) {
                        highscore = score;
                        localStorage.setItem("besenHighscore", score);
                        document.getElementById("highscore").innerText = highscore;
                    }
                    score = 0;
                    obstacles = [];
                }
                if (obs.y > 500) { obstacles.splice(index, 1); score++; }
            });

            // Spieler zeichnen
            ctx.drawImage(avatarImg, player.x, player.y, player.size, player.size);
            requestAnimationFrame(update);
        }

        // Steuerung für Touch & Maus
        canvas.addEventListener("touchmove", (e) => {
            player.x = e.touches[0].clientX - canvas.offsetLeft - 30;
        });
        canvas.addEventListener("mousemove", (e) => {
            player.x = e.clientX - canvas.offsetLeft - 30;
        });

        update();
    </script>
</body>
</html>
