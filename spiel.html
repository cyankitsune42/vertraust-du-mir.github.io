<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magischer Flug</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: linear-gradient(to bottom, #1a1a2e, #16213e); border: 2px solid #d4af37; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // Spiel an Bildschirmgröße anpassen
        canvas.width = window.innerWidth * 0.9;
        canvas.height = window.innerHeight * 0.8;

        let player = { x: 50, y: canvas.height / 2, size: 80, vy: 0 };
        let obstacles = [];
        let score = 0;
        let gameActive = true;

        const avatar = new Image();
        avatar.src = 'file_0000000037e871fd8bd6e0fd161d3f04.png';

        function spawnObstacle() {
            obstacles.push({ x: canvas.width, y: Math.random() * (canvas.height - 50), w: 50, h: 50 });
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Spielerbewegung (Schwerkraft-Effekt)
            player.y += player.vy;
            player.vy += 0.5; // Schwerkraft

            // Zeichne Avatar
            ctx.drawImage(avatar, player.x, player.y, player.size, player.size);

            // Hindernisse
            obstacles.forEach((obs, index) => {
                obs.x -= 7; // Geschwindigkeit
                ctx.fillStyle = "#e94560";
                ctx.beginPath();
                ctx.arc(obs.x, obs.y, 25, 0, Math.PI * 2);
                ctx.fill();

                // Kollision (einfache Distanzmessung)
                let dx = (player.x + 40) - obs.x;
                let dy = (player.y + 40) - obs.y;
                if (Math.sqrt(dx * dx + dy * dy) < 50) gameActive = false;

                if (obs.x < -50) { obstacles.splice(index, 1); score++; }
            });

            if (Math.random() < 0.03) spawnObstacle();
            requestAnimationFrame(update);
        }

        window.addEventListener("touchstart", () => player.vy = -8);
        window.addEventListener("mousedown", () => player.vy = -8);

        update();
    </script>
</body>
</html>
